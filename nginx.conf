server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /shop {
        return 301 /fantazia-shop.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}
