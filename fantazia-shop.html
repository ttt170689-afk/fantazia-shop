<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantazia RP — Магазин</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#060411;
  color:#e8e4ff;
  font-family:'Orbitron',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.bg-glow{
  position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 50%, rgba(108,92,231,.18) 0%, transparent 70%);
}
.card{
  text-align:center;
  padding:60px 50px;
  background:rgba(255,255,255,.03);
  border:1.5px solid rgba(108,92,231,.35);
  border-radius:28px;
  box-shadow:0 0 60px rgba(108,92,231,.2);
  max-width:420px;
  width:90%;
  position:relative;
  z-index:1;
}
.icon{
  font-size:72px;
  display:block;
  margin-bottom:28px;
  filter:drop-shadow(0 0 24px rgba(162,155,254,.6));
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{filter:drop-shadow(0 0 16px rgba(162,155,254,.5));}
  50%{filter:drop-shadow(0 0 36px rgba(162,155,254,.9));}
}
h1{
  font-size:clamp(22px,5vw,32px);
  font-weight:900;
  color:#fff;
  letter-spacing:2px;
  margin-bottom:16px;
}
h1 em{color:#a29bfe;font-style:normal;}
p{
  font-size:14px;
  color:rgba(162,155,254,.6);
  letter-spacing:1px;
  line-height:1.8;
  font-family:'Segoe UI',sans-serif;
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card">
  <span class="icon">🔒</span>
  <h1><em>Магазин</em> закрыт</h1>
  <p>Магазин временно недоступен.<br>Скоро вернёмся — следите за обновлениями!</p>
</div>
</body>
</html>
